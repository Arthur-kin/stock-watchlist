name: CD

# 觸發條件：當名稱為 "CI" 的工作流執行完畢時觸發
on:
  workflow_run:
    workflows: ["CI"] # 必須與 CI.yml 的 name 完全一致
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 關鍵防禦機制：只有當 CI 的最終結果是「成功 (success)」時，才執行後續的部署動作
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: 1. copy  GitHub's code 上的程式碼
        uses: actions/checkout@v4

      - name: 2. sign in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. package Docker image and push Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stock-frontend:latest

      - name: 4. connect vm by  SSH ，notice Docker container update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # remote vm's execution
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-frontend:latest
            docker stop stock-frontend-app || true
            docker rm stock-frontend-app || true
            docker run -d -p 80:80 --name stock-frontend-app ${{ secrets.DOCKERHUB_USERNAME }}/stock-frontend:latest
